<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[アプリ名]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>[アプリ名]</h1>
    </header>

    <main>
        <section class="app-image-area">
            <img src="" alt="[アプリのスクリーンショット]" class="placeholder-img">
            <p class="note">※ここにPC画面などのアプリ画像が入ります</p>
        </section>

        <section class="description-area">
            <div id="description-content">紹介文を読み込み中...</div>
        </section>

        <section class="download-area">
            <div class="links">
                <a href="[ここにダウンロードURLを貼り付けます]" class="btn pc-download">アプリをダウンロード</a>
            </div>
        </section>
    </main>

    <script>
        fetch('description.txt')
            .then(response => response.text())
            .then(text => {
                document.getElementById('description-content').textContent = text;
            })
            .catch(error => {
                document.getElementById('description-content').textContent = "紹介文を読み込めませんでした。";
            });
    </script>
</body>
</html>
