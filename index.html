<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[MusicAtelier]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>[MusicAtelier]</h1>
    </header>

    <main>
        <section class="intro-section">
            <h2>「積み上げる」新しい音楽製作体験</h2>
            <p>直感的に、ステップバイステップで、ポリゴン図形でリズムを可視化する新感覚シンセサイザー</p>
        </section>

        <section class="image-section">
            
            <div class="image-block">
    <img src="doramuennsougamenn.png" alt="ドラム演奏画面" class="app-image">
    <p class="image-text">従来の音楽制作アプリは、「最初からすべての楽器が並んでいて何から始めればいいかわからない」という複雑さを抱えていました。
        MusicAtelierは、個人が感覚的に音楽を組み立てられる「視覚中心の音楽制作アプリ」です。
    </p>
　　　　<div class="image-block">
    <img src="メニュー画面.png" alt="メインメニュー画面" class="app-image">
    <p class="image-text">シームレスなAPI後世により、画面移動時も音楽を止めずに政策に没頭できます。
        そして主要な4つのモジュールから、直感的なビートメイクを行うことができます。
    </p>
</div>
            </section>

        <section class="download-section">
            <a href="#" id="download-btn" class="btn" target="_blank" rel="noopener noreferrer">アプリをダウンロード</a>
        </section>
    </main>

    <script>
        fetch('download_url.txt')
            .then(response => response.text())
            .then(text => {
                const url = text.trim();
                if (url) {
                    document.getElementById('download-btn').href = url;
                }
            })
            .catch(error => {
                console.error("ダウンロードURLを読み込めませんでした。");
            });
    </script>

</body>
</html>
